name: Release Helm Chart to GHCR

on:
  push:
    branches:
      - master
    paths:
      - 'charts/webapp/**'
      - '.github/workflows/release.yaml'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart dependencies
        run: helm dependency update charts/webapp

      - name: Package and push Helm chart
        run: |
          helm package charts/webapp

          CHART_NAME=$(yq '.name' charts/webapp/Chart.yaml)
          CHART_VERSION=$(yq '.version' charts/webapp/Chart.yaml)

          helm push "${CHART_NAME}-${CHART_VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/helm-charts
