# Default values for node-webapp chart

# Image configuration for Node.js application
# Build example: docker build -t yourorg/node-webapp-example:latest examples/node-app/
image:
  registry: ""
  repository: jthegunner/node-js
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Replica count
replicaCount: 1

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Node.js container configuration
nodejs:
  # Container port
  port: 3000
  
  # Command to run (defaults to npm start)
  command: []
    # - node
    # - server.js
  
  # Resource limits
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Environment variables
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "3000"

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 3000  # Node.js application port
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: node-app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: node-app-tls
    #   hosts:
    #     - node-app.local

# Health check configuration
livenessProbe:
  enabled: true
  path: /health
  port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /ready
  port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Application-specific configuration (mounted as ConfigMap)
config: {}
  # API_URL: "https://api.example.com"
  # FEATURE_FLAG_X: "true"
