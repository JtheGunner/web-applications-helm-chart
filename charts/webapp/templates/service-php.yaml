{{- if .Values.php.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webapp.fullname" . }}-php
  labels:
    {{- include "webapp.php.labels" . | nindent 4 }}
  {{- with .Values.php.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.php.service.type }}
  ports:
    - port: {{ .Values.php.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "webapp.php.selectorLabels" . | nindent 4 }}
{{- end }}
