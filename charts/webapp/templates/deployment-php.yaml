{{- if .Values.php.enabled }}
{{- $fullName := include "webapp.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-php
  labels:
    {{- include "webapp.php.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.php.revisionHistoryLimit }}
  {{- if not .Values.php.autoscaling.enabled }}
  replicas: {{ .Values.php.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "webapp.php.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/nginx-config.yaml") . | sha256sum }}
        {{- if .Values.config }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.php.config }}
        checksum/php-fpm-config: {{ include (print $.Template.BasePath "/configmap-php-fpm.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "webapp.php.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "webapp.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.php.podSecurityContext | nindent 8 }}

      volumes:
        - name: app-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ $fullName }}-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: php-socket
          emptyDir: {}
        {{- if .Values.php.config }}
        - name: php-fpm-config
          configMap:
            name: {{ include "webapp.php.configMapName" . }}
        {{- end }}
        {{- if and (eq .Values.php.app.source "git") .Values.php.app.git.sshSecret.name }}
        - name: git-ssh
          secret:
            secretName: {{ .Values.php.app.git.sshSecret.name }}
            # 0440 so the file is readable by the pod's fsGroup. The
            # git-clone container copies it to /tmp/.ssh/id with chmod 600
            # before invoking SSH, so OpenSSH never sees this mode directly.
            defaultMode: 288  # 0440
        {{- end }}
        {{- if eq .Values.php.app.source "git" }}
        - name: passwd-fixup
          configMap:
            name: {{ include "webapp.passwdConfigMapName" . }}
        {{- end }}

      initContainers:
        {{- if eq .Values.php.app.source "image" }}
        # Copy the app code from the runtime image into the shared volume.
        - name: copy-app
          image: "{{ include "webapp.php.image" . }}"
          imagePullPolicy: {{ include "webapp.php.imagePullPolicy" . }}
          securityContext:
            {{- toYaml .Values.php.securityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              set -e
              if [ -d "{{ .Values.php.app.imageSourceDir }}" ]; then
                cp -aR {{ .Values.php.app.imageSourceDir }}/. /app-files/
              fi
          volumeMounts:
            - name: app-files
              mountPath: /app-files
        {{- else if eq .Values.php.app.source "git" }}
        # Clone the repo into the shared volume at pod start.
        # Runs as the same UID as the build/runtime containers so that
        # files cloned here are owned by the same user that later runs
        # composer/php-fpm — avoids git's "dubious ownership" check.
        - name: git-clone
          image: "{{ .Values.php.app.git.image.repository }}:{{ .Values.php.app.git.image.tag }}"
          imagePullPolicy: {{ .Values.php.app.git.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.php.securityContext | nindent 12 }}
          {{- if .Values.php.app.git.sshSecret.name }}
          env:
            - name: GIT_SSH_COMMAND
              value: "ssh -i /tmp/.ssh/id -o UserKnownHostsFile=/tmp/.ssh/known_hosts -o StrictHostKeyChecking=accept-new"
          {{- end }}
          command:
            - sh
            - -c
            - |
              set -e
              {{- if .Values.php.app.git.sshSecret.name }}
              {{- $pkKey := .Values.php.app.git.sshSecret.privateKeyKey | default "ssh-privatekey" }}
              {{- $khKey := .Values.php.app.git.sshSecret.knownHostsKey | default "known_hosts" }}
              mkdir -p /tmp/.ssh
              cp /etc/git-ssh/{{ $pkKey }} /tmp/.ssh/id
              chmod 600 /tmp/.ssh/id
              if [ -f /etc/git-ssh/{{ $khKey }} ]; then
                cp /etc/git-ssh/{{ $khKey }} /tmp/.ssh/known_hosts
              else
                touch /tmp/.ssh/known_hosts
              fi
              {{- end }}
              # Safe re-clone: empty the target (including hidden files).
              find /app-files -mindepth 1 -delete
              {{- if eq (int (.Values.php.app.git.depth | default 1)) 0 }}
              git clone {{ .Values.php.app.git.url }} /tmp/repo
              cd /tmp/repo
              git -c advice.detachedHead=false checkout {{ .Values.php.app.git.ref | default "main" }}
              {{- else }}
              git clone --depth {{ .Values.php.app.git.depth }} --branch {{ .Values.php.app.git.ref | default "main" }} --single-branch {{ .Values.php.app.git.url }} /tmp/repo
              {{- end }}
              {{- if .Values.php.app.git.subPath }}
              cp -aR /tmp/repo/{{ .Values.php.app.git.subPath }}/. /app-files/
              {{- else }}
              cp -aR /tmp/repo/. /app-files/
              {{- end }}
          volumeMounts:
            - name: app-files
              mountPath: /app-files
            {{- if .Values.php.app.git.sshSecret.name }}
            - name: git-ssh
              mountPath: /etc/git-ssh
              readOnly: true
            {{- end }}
            - name: passwd-fixup
              mountPath: /etc/passwd
              subPath: passwd
              readOnly: true
          resources:
            {{- toYaml .Values.php.app.git.resources | nindent 12 }}
        {{- if .Values.php.app.build.enabled }}
        # Build step (composer install etc.) in the runtime or build image.
        - name: app-build
          image: {{ if .Values.php.app.build.image.repository -}}
                   "{{ .Values.php.app.build.image.repository }}:{{ .Values.php.app.build.image.tag }}"
                 {{- else -}}
                   "{{ include "webapp.php.image" . }}"
                 {{- end }}
          imagePullPolicy: {{ if .Values.php.app.build.image.repository -}}
                             {{ .Values.php.app.build.image.pullPolicy }}
                           {{- else -}}
                             {{ include "webapp.php.imagePullPolicy" . }}
                           {{- end }}
          securityContext:
            {{- toYaml .Values.php.securityContext | nindent 12 }}
          workingDir: /var/www/html
          env:
            # Inject git's safe.directory='*' via env vars. This works
            # even when the build container's UID lacks a writable HOME
            # (composer image runs build as UID 33 with no /etc/passwd
            # entry), unlike `git config --global ...` which silently fails.
            - name: GIT_CONFIG_COUNT
              value: "1"
            - name: GIT_CONFIG_KEY_0
              value: "safe.directory"
            - name: GIT_CONFIG_VALUE_0
              value: "*"
            {{- with .Values.php.app.build.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          command:
            - sh
            - -c
            - {{ .Values.php.app.build.command | quote }}
          volumeMounts:
            - name: app-files
              mountPath: /var/www/html
            - name: passwd-fixup
              mountPath: /etc/passwd
              subPath: passwd
              readOnly: true
          resources:
            {{- toYaml .Values.php.app.build.resources | nindent 12 }}
        {{- end }}
        {{- end }}

      containers:
        # ---- PHP-FPM Container ----
        - name: php-fpm
          image: "{{ include "webapp.php.image" . }}"
          imagePullPolicy: {{ include "webapp.php.imagePullPolicy" . }}

          securityContext:
            {{- toYaml .Values.php.securityContext | nindent 12 }}

          ports:
            - name: fpm
              containerPort: 9000
              protocol: TCP

          env:
            {{- include "webapp.databaseEnvVars" . | nindent 12 }}
            {{- with .Values.php.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- $phpEnvFrom := include "webapp.php.envFrom" . | trim }}
          {{- if $phpEnvFrom }}
          envFrom:
            {{- include "webapp.php.envFrom" . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: app-files
              mountPath: /var/www/html
            - name: php-socket
              mountPath: /var/run/php
            {{- if .Values.php.config }}
            - name: php-fpm-config
              mountPath: /usr/local/etc/php-fpm.d
            {{- end }}

          {{- if .Values.php.fpmProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: {{ .Values.php.fpmProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.fpmProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.fpmProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.fpmProbe.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: {{ .Values.php.fpmProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.fpmProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.fpmProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.fpmProbe.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.php.resources | nindent 12 }}

        # ---- Nginx Sidecar Container ----
        - name: nginx
          image: "{{ .Values.php.nginx.image.repository }}:{{ .Values.php.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.php.nginx.image.pullPolicy }}

          securityContext:
            {{- include "webapp.nginx.securityContext" . | nindent 12 }}

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          volumeMounts:
            - name: app-files
              mountPath: /var/www/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: php-socket
              mountPath: /var/run/php

          {{- if .Values.php.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.php.startupProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.php.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.startupProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.php.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.php.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.php.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.livenessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.php.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.php.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.php.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.readinessProbe.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.php.nginx.resources | nindent 12 }}

      {{- with (default .Values.nodeSelector .Values.php.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.affinity .Values.php.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.tolerations .Values.php.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.php.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
