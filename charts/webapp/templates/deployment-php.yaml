{{- if .Values.php.enabled }}
{{- $fullName := include "webapp.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-php
  labels:
    {{- include "webapp.php.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.php.revisionHistoryLimit }}
  {{- if not .Values.php.autoscaling.enabled }}
  replicas: {{ .Values.php.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "webapp.php.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/nginx-config.yaml") . | sha256sum }}
        {{- if .Values.config }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.php.config }}
        checksum/php-fpm-config: {{ include (print $.Template.BasePath "/configmap-php-fpm.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "webapp.php.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "webapp.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.php.podSecurityContext | nindent 8 }}

      volumes:
        - name: app-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ $fullName }}-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: php-socket
          emptyDir: {}
        {{- if .Values.php.config }}
        - name: php-fpm-config
          configMap:
            name: {{ include "webapp.php.configMapName" . }}
        {{- end }}

      {{- if .Values.php.initContainer.enabled }}
      initContainers:
        - name: copy-app
          image: "{{ include "webapp.php.image" . }}"
          imagePullPolicy: {{ include "webapp.php.imagePullPolicy" . }}
          securityContext:
            {{- toYaml .Values.php.securityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              set -e
              if [ -d "{{ .Values.php.initContainer.sourceDir }}" ]; then
                cp -aR {{ .Values.php.initContainer.sourceDir }}/. /app-files/
              fi
          volumeMounts:
            - name: app-files
              mountPath: /app-files
      {{- end }}

      containers:
        # ---- PHP-FPM Container ----
        - name: php-fpm
          image: "{{ include "webapp.php.image" . }}"
          imagePullPolicy: {{ include "webapp.php.imagePullPolicy" . }}

          securityContext:
            {{- toYaml .Values.php.securityContext | nindent 12 }}

          ports:
            - name: fpm
              containerPort: 9000
              protocol: TCP

          env:
            {{- include "webapp.databaseEnvVars" . | nindent 12 }}
            {{- with .Values.php.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- $phpEnvFrom := include "webapp.php.envFrom" . | trim }}
          {{- if $phpEnvFrom }}
          envFrom:
            {{- include "webapp.php.envFrom" . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: app-files
              mountPath: /var/www/html
            - name: php-socket
              mountPath: /var/run/php
            {{- if .Values.php.config }}
            - name: php-fpm-config
              mountPath: /usr/local/etc/php-fpm.d
            {{- end }}

          {{- if .Values.php.fpmProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: {{ .Values.php.fpmProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.fpmProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.fpmProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.fpmProbe.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: {{ .Values.php.fpmProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.fpmProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.fpmProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.fpmProbe.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.php.resources | nindent 12 }}

        # ---- Nginx Sidecar Container ----
        - name: nginx
          image: "{{ .Values.php.nginx.image.repository }}:{{ .Values.php.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.php.nginx.image.pullPolicy }}

          securityContext:
            {{- include "webapp.nginx.securityContext" . | nindent 12 }}

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          volumeMounts:
            - name: app-files
              mountPath: /var/www/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: php-socket
              mountPath: /var/run/php

          {{- if .Values.php.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.php.startupProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.php.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.startupProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.php.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.php.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.php.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.livenessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.php.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.php.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.php.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.php.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.php.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.php.readinessProbe.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.php.nginx.resources | nindent 12 }}

      {{- with (default .Values.nodeSelector .Values.php.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.affinity .Values.php.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.tolerations .Values.php.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.php.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
