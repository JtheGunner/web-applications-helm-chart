{{- if and .Values.php.enabled .Values.php.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "webapp.fullname" . }}-php
  labels:
    {{- include "webapp.php.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "webapp.fullname" . }}-php
  minReplicas: {{ .Values.php.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.php.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.php.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
