{{/*
Validation: ensure at least one runtime is enabled. This template is
included to trigger a fail at render time if neither php nor nodejs
is activated.
*/}}
{{- if and (not .Values.php.enabled) (not .Values.nodejs.enabled) }}
{{- fail "ERROR: at least one runtime must be enabled. Set php.enabled=true and/or nodejs.enabled=true." }}
{{- end }}

{{- if and .Values.postgresql.enabled .Values.mariadb.enabled }}
{{- fail "ERROR: only one database can be enabled at a time. Set either postgresql.enabled=true OR mariadb.enabled=true." }}
{{- end }}

{{/* app.source must be valid; git.url required when source=git. */}}
{{- if .Values.php.enabled }}
{{- $src := .Values.php.app.source }}
{{- if not (or (eq $src "image") (eq $src "git")) }}
{{- fail (printf "ERROR: php.app.source must be \"image\" or \"git\" (got: %q)." $src) }}
{{- end }}
{{- if and (eq $src "git") (not .Values.php.app.git.url) }}
{{- fail "ERROR: php.app.git.url is required when php.app.source=git." }}
{{- end }}
{{- if and .Values.php.app.build.enabled (not .Values.php.app.build.command) }}
{{- fail "ERROR: php.app.build.command is required when php.app.build.enabled=true." }}
{{- end }}
{{- end }}

{{- if .Values.nodejs.enabled }}
{{- $src := .Values.nodejs.app.source }}
{{- if not (or (eq $src "image") (eq $src "git")) }}
{{- fail (printf "ERROR: nodejs.app.source must be \"image\" or \"git\" (got: %q)." $src) }}
{{- end }}
{{- if and (eq $src "git") (not .Values.nodejs.app.git.url) }}
{{- fail "ERROR: nodejs.app.git.url is required when nodejs.app.source=git." }}
{{- end }}
{{- if and .Values.nodejs.app.build.enabled (not .Values.nodejs.app.build.command) }}
{{- fail "ERROR: nodejs.app.build.command is required when nodejs.app.build.enabled=true." }}
{{- end }}
{{- end }}
