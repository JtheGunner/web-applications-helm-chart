{{- if and .Values.nodejs.enabled .Values.nodejs.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "webapp.fullname" . }}-nodejs
  labels:
    {{- include "webapp.nodejs.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "webapp.nodejs.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- if .Values.nodejs.networkPolicy.ingress }}
    {{- toYaml .Values.nodejs.networkPolicy.ingress | nindent 4 }}
    {{- else }}
    - {}
    {{- end }}
{{- end }}
