{{- if .Values.nodejs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webapp.fullname" . }}-nodejs
  labels:
    {{- include "webapp.nodejs.labels" . | nindent 4 }}
  {{- with .Values.nodejs.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.nodejs.service.type }}
  ports:
    - port: {{ .Values.nodejs.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "webapp.nodejs.selectorLabels" . | nindent 4 }}
{{- end }}
