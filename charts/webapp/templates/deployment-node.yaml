{{- if .Values.nodejs.enabled }}
{{- $fullName := include "webapp.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-nodejs
  labels:
    {{- include "webapp.nodejs.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.nodejs.revisionHistoryLimit }}
  {{- if not .Values.nodejs.autoscaling.enabled }}
  replicas: {{ .Values.nodejs.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "webapp.nodejs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.config }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "webapp.nodejs.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "webapp.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.nodejs.podSecurityContext | nindent 8 }}

      {{- if eq .Values.nodejs.app.source "git" }}
      volumes:
        - name: app-files
          emptyDir: {}
        {{- if .Values.nodejs.app.git.sshSecret.name }}
        - name: git-ssh
          secret:
            secretName: {{ .Values.nodejs.app.git.sshSecret.name }}
            defaultMode: 256  # 0400
        {{- end }}

      initContainers:
        - name: git-clone
          image: "{{ .Values.nodejs.app.git.image.repository }}:{{ .Values.nodejs.app.git.image.tag }}"
          imagePullPolicy: {{ .Values.nodejs.app.git.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.nodejs.app.git.sshSecret.name }}
          env:
            - name: GIT_SSH_COMMAND
              value: "ssh -i /tmp/.ssh/id -o UserKnownHostsFile=/tmp/.ssh/known_hosts -o StrictHostKeyChecking=accept-new"
          {{- end }}
          command:
            - sh
            - -c
            - |
              set -e
              {{- if .Values.nodejs.app.git.sshSecret.name }}
              {{- $pkKey := .Values.nodejs.app.git.sshSecret.privateKeyKey | default "ssh-privatekey" }}
              {{- $khKey := .Values.nodejs.app.git.sshSecret.knownHostsKey | default "known_hosts" }}
              mkdir -p /tmp/.ssh
              cp /etc/git-ssh/{{ $pkKey }} /tmp/.ssh/id
              chmod 600 /tmp/.ssh/id
              if [ -f /etc/git-ssh/{{ $khKey }} ]; then
                cp /etc/git-ssh/{{ $khKey }} /tmp/.ssh/known_hosts
              else
                touch /tmp/.ssh/known_hosts
              fi
              {{- end }}
              find /app-files -mindepth 1 -delete
              {{- if eq (int (.Values.nodejs.app.git.depth | default 1)) 0 }}
              git clone {{ .Values.nodejs.app.git.url }} /tmp/repo
              cd /tmp/repo
              git -c advice.detachedHead=false checkout {{ .Values.nodejs.app.git.ref | default "main" }}
              {{- else }}
              git clone --depth {{ .Values.nodejs.app.git.depth }} --branch {{ .Values.nodejs.app.git.ref | default "main" }} --single-branch {{ .Values.nodejs.app.git.url }} /tmp/repo
              {{- end }}
              {{- if .Values.nodejs.app.git.subPath }}
              cp -aR /tmp/repo/{{ .Values.nodejs.app.git.subPath }}/. /app-files/
              {{- else }}
              cp -aR /tmp/repo/. /app-files/
              {{- end }}
          volumeMounts:
            - name: app-files
              mountPath: /app-files
            {{- if .Values.nodejs.app.git.sshSecret.name }}
            - name: git-ssh
              mountPath: /etc/git-ssh
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.nodejs.app.git.resources | nindent 12 }}
        {{- if .Values.nodejs.app.build.enabled }}
        - name: app-build
          image: {{ if .Values.nodejs.app.build.image.repository -}}
                   "{{ .Values.nodejs.app.build.image.repository }}:{{ .Values.nodejs.app.build.image.tag }}"
                 {{- else -}}
                   "{{ include "webapp.nodejs.image" . }}"
                 {{- end }}
          imagePullPolicy: {{ if .Values.nodejs.app.build.image.repository -}}
                             {{ .Values.nodejs.app.build.image.pullPolicy }}
                           {{- else -}}
                             {{ include "webapp.nodejs.imagePullPolicy" . }}
                           {{- end }}
          securityContext:
            {{- toYaml .Values.nodejs.securityContext | nindent 12 }}
          workingDir: {{ .Values.nodejs.app.workingDir }}
          {{- with .Values.nodejs.app.build.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - sh
            - -c
            - {{ .Values.nodejs.app.build.command | quote }}
          volumeMounts:
            - name: app-files
              mountPath: {{ .Values.nodejs.app.workingDir }}
          resources:
            {{- toYaml .Values.nodejs.app.build.resources | nindent 12 }}
        {{- end }}
      {{- end }}

      containers:
        - name: nodejs
          image: "{{ include "webapp.nodejs.image" . }}"
          imagePullPolicy: {{ include "webapp.nodejs.imagePullPolicy" . }}

          securityContext:
            {{- toYaml .Values.nodejs.securityContext | nindent 12 }}

          {{- if eq .Values.nodejs.app.source "git" }}
          workingDir: {{ .Values.nodejs.app.workingDir }}
          {{- end }}

          {{- if .Values.nodejs.command }}
          command:
            {{- toYaml .Values.nodejs.command | nindent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.nodejs.port }}
              protocol: TCP

          env:
            - name: PORT
              value: {{ .Values.nodejs.port | quote }}
            {{- include "webapp.databaseEnvVars" . | nindent 12 }}
            {{- with .Values.nodejs.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- $nodeEnvFrom := include "webapp.nodejs.envFrom" . | trim }}
          {{- if $nodeEnvFrom }}
          envFrom:
            {{- include "webapp.nodejs.envFrom" . | nindent 12 }}
          {{- end }}

          {{- if eq .Values.nodejs.app.source "git" }}
          volumeMounts:
            - name: app-files
              mountPath: {{ .Values.nodejs.app.workingDir }}
          {{- end }}

          {{- if .Values.nodejs.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.nodejs.startupProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.nodejs.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.nodejs.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.nodejs.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.nodejs.startupProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.nodejs.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.nodejs.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.nodejs.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.nodejs.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.nodejs.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.nodejs.livenessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.nodejs.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.nodejs.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.nodejs.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.nodejs.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.nodejs.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.nodejs.readinessProbe.failureThreshold }}
          {{- end }}

          resources:
            {{- toYaml .Values.nodejs.resources | nindent 12 }}

      {{- with (default .Values.nodeSelector .Values.nodejs.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.affinity .Values.nodejs.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default .Values.tolerations .Values.nodejs.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodejs.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
