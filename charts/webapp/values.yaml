# =============================================================================
# Webapp Helm Chart – Default Values
# =============================================================================
# Enable php.enabled and/or nodejs.enabled to deploy the respective runtime.
# At least one runtime must be enabled.
# =============================================================================

# =============================================================================
# PHP Runtime (PHP-FPM + Nginx sidecar)
# =============================================================================
php:
  enabled: false

  image:
    registry: ""
    repository: ""
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1
  revisionHistoryLimit: 5

  # Pod security context. fsGroup MUST match the GID the image expects for
  # /var/www/html. For the official php:*-fpm images that's 33 (www-data).
  podSecurityContext:
    fsGroup: 33

  # Container security context for PHP-FPM. runAsUser=33 maps to "www-data"
  # in the official php:*-fpm images. Adjust for custom images.
  securityContext:
    runAsNonRoot: true
    runAsUser: 33
    runAsGroup: 33
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  # Environment variables for the PHP-FPM container.
  env: []
    # - name: APP_ENV
    #   value: production
    # - name: APP_KEY
    #   valueFrom:
    #     secretKeyRef:
    #       name: app-secrets
    #       key: app-key

  # envFrom sources for PHP-FPM (in addition to the root config ConfigMap,
  # which is included automatically when .Values.config is set).
  envFrom: []
    # - secretRef:
    #     name: app-secrets
    # - configMapRef:
    #     name: extra-config

  # PHP-FPM configuration: rendered as a ConfigMap and mounted at
  # /usr/local/etc/php-fpm.d/. Keys become file names.
  config: {}
    # www.conf: |
    #   [www]
    #   pm = dynamic
    #   pm.max_children = 50
    #   pm.start_servers = 5

  # Application code source.
  app:
    # "image": code comes from the PHP runtime image (default).
    #          An init container copies /var/www/html from the image into the
    #          shared app-files volume (mounted by both PHP-FPM and Nginx).
    # "git":   code is cloned from a Git repo at pod start.
    #          Optionally followed by a build step (composer install, etc.).
    source: image

    # Only relevant for source=image. Path inside the PHP image whose contents
    # are copied to /var/www/html.
    imageSourceDir: /var/www/html

    # Only relevant for source=git.
    git:
      image:
        repository: alpine/git
        tag: latest
        pullPolicy: IfNotPresent
      # Repo URL (HTTPS for public repos, SSH for private).
      url: ""
      # Branch, tag, or full commit SHA.
      ref: main
      # 0 = full clone (needed for SHA checkout),
      # >0 = shallow clone --depth N (faster; branch/tag only).
      depth: 1
      # Optional: use only this subdirectory as app root.
      subPath: ""
      # Private repo access via SSH key from a Secret.
      # Example secret:
      #   kubectl create secret generic portfolio-ssh \
      #     --from-file=ssh-privatekey=$HOME/.ssh/id_ed25519 \
      #     --from-file=known_hosts=$HOME/.ssh/known_hosts
      sshSecret:
        name: ""
        privateKeyKey: ssh-privatekey
        knownHostsKey: known_hosts
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

    # Build step AFTER git-clone. Defaults to "composer install" in the
    # official composer image, which is what 99% of PHP apps need.
    # Only relevant when app.source=git. To skip it, set build.enabled=false.
    build:
      enabled: true
      # If image.repository is empty, the runtime image (php.image) is used.
      image:
        repository: composer
        tag: "2"
        pullPolicy: IfNotPresent
      # Executed via sh -c "..."; CWD = /var/www/html.
      # The default handles two common gotchas:
      #   - git config safe.directory '*': avoids "dubious ownership" errors when
      #     the build container's UID differs from the git-clone container's UID.
      #   - --ignore-platform-reqs: the composer image is a slim PHP-CLI image and
      #     usually lacks extensions like ext-intl/ext-pdo that the *runtime* image
      #     provides. Composer would refuse to install otherwise. Make sure your
      #     RUNTIME PHP-FPM image actually has those extensions installed!
      command: "git config --global --add safe.directory '*' && composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs"
      env: []
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi

  nginx:
    image:
      repository: nginx
      tag: "1.27-alpine"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    # Optional: server_name in the Nginx config (default "_" matches any host).
    serverName: "_"

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts: []
      # - host: app.example.com
      #   paths:
      #     - path: /
      #       pathType: Prefix
    tls: []
      # - secretName: app-tls
      #   hosts:
      #     - app.example.com

  # HTTP probes run against the Nginx sidecar (port 80).
  livenessProbe:
    enabled: true
    path: /health.php
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    path: /health.php
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Startup probe for slow-booting frameworks (Laravel boot, Composer autoload).
  startupProbe:
    enabled: false
    path: /health.php
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

  # TCP probe directly on the PHP-FPM worker (port 9000) so that hung
  # FPM processes are restarted by the kubelet.
  fpmProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  # PodDisruptionBudget (HA against node drains).
  pdb:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  # NetworkPolicy. When enabled, only pods matching the selectors below are
  # allowed to ingress. Default: empty = all ingress allowed.
  networkPolicy:
    enabled: false
    ingress: []
      # - from:
      #     - namespaceSelector:
      #         matchLabels:
      #           kubernetes.io/metadata.name: ingress-nginx

  # Scheduling: overrides root-level values when set.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
    # - maxSkew: 1
    #   topologyKey: topology.kubernetes.io/zone
    #   whenUnsatisfiable: ScheduleAnyway
    #   labelSelector:
    #     matchLabels:
    #       app.kubernetes.io/component: php

# =============================================================================
# Node.js Runtime
# =============================================================================
nodejs:
  enabled: false

  image:
    registry: ""
    repository: ""
    tag: "latest"
    pullPolicy: IfNotPresent

  port: 3000

  # Custom command (default: image ENTRYPOINT / CMD).
  command: []
    # - node
    # - server.js

  replicaCount: 1
  revisionHistoryLimit: 5

  podSecurityContext:
    fsGroup: 1000

  # Container security context. The official node:*-alpine image has "node"
  # with UID 1000.
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  env:
    - name: NODE_ENV
      value: production

  envFrom: []

  # Application code source (analogous to php.app).
  app:
    # "image": code comes from the Node runtime image (default, no init
    #          container, the container runs straight from the image filesystem).
    # "git":   code is cloned from a Git repo at pod start.
    #          Adds an extra emptyDir volume mounted at workingDir and used
    #          as CWD. Optionally followed by an npm-install step.
    source: image

    # Only relevant for source=git: the repo is mounted here and used as CWD.
    workingDir: /app

    git:
      image:
        repository: alpine/git
        tag: latest
        pullPolicy: IfNotPresent
      url: ""
      ref: main
      depth: 1
      subPath: ""
      sshSecret:
        name: ""
        privateKeyKey: ssh-privatekey
        knownHostsKey: known_hosts
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

    build:
      enabled: false
      image:
        repository: ""
        tag: ""
        pullPolicy: IfNotPresent
      # CWD = nodejs.app.workingDir.
      command: ""
        # Example:
        # command: "npm ci --omit=dev"
      env: []
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    enabled: false
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  pdb:
    enabled: false
    minAvailable: 1

  networkPolicy:
    enabled: false
    ingress: []

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# =============================================================================
# Database env-var mapping
# =============================================================================
# Controls the names of the DB environment variables injected into the runtime
# containers. Defaults follow Laravel/Symfony style. For Node.js apps the keys
# can be overridden (e.g. POSTGRES_HOST, DATABASE_URL).
# =============================================================================
database:
  envMapping:
    connection: DB_CONNECTION
    host: DB_HOST
    port: DB_PORT
    database: DB_DATABASE
    username: DB_USERNAME
    password: DB_PASSWORD

# =============================================================================
# Database – PostgreSQL (Bitnami sub-chart)
# =============================================================================
# Enable postgresql.enabled OR mariadb.enabled, not both.
# Docs: https://github.com/bitnami/charts/tree/main/bitnami/postgresql
#
# Production: prefer existingSecret over inline passwords.
# =============================================================================
postgresql:
  enabled: false
  auth:
    postgresPassword: ""
    username: "webapp"
    password: ""
    database: "webapp"
    existingSecret: ""
    # Key inside existingSecret that holds the user password (Bitnami default: "password").
    secretKeys:
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 8Gi

# =============================================================================
# Database – MariaDB (Bitnami sub-chart)
# =============================================================================
# Enable mariadb.enabled OR postgresql.enabled, not both.
# Docs: https://github.com/bitnami/charts/tree/main/bitnami/mariadb
# =============================================================================
mariadb:
  enabled: false
  auth:
    rootPassword: ""
    username: "webapp"
    password: ""
    database: "webapp"
    existingSecret: ""
    # Key inside existingSecret. Bitnami default for the user password: "mariadb-password".
    secretKeys:
      userPasswordKey: mariadb-password
  primary:
    persistence:
      enabled: true
      size: 8Gi

# =============================================================================
# Shared configuration
# =============================================================================
nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# Root-level scheduling (fallback when nothing is set per runtime).
nodeSelector: {}
tolerations: []
affinity: {}

# Shared app config: rendered as a ConfigMap and consumed via envFrom in all
# enabled runtimes. Keys are the env-var names.
config: {}
  # APP_NAME: "My App"
  # LOG_LEVEL: "info"
