apiVersion: v2
name: webapp
description: Ein universelles Helm Chart für Webapplikationen mit PHP und/oder Node.js Support inkl. optionaler Datenbank
type: application
version: 1.2.0
appVersion: "1.2"
maintainers:
  - name: JtheGunner
keywords:
  - webapp
  - php
  - nodejs
  - postgresql
  - mariadb
  - kubernetes

# OCI annotations: GHCR liest org.opencontainers.image.source und linkt das
# Package automatisch an dieses Repository (Voraussetzung dafür, dass der
# Workflow-eigene GITHUB_TOKEN das Package neu anlegen darf).
annotations:
  org.opencontainers.image.source: https://github.com/JtheGunner/web-applications-helm-chart
  org.opencontainers.image.description: "Universelles Helm Chart für PHP- und Node.js-Webapplikationen mit optionaler Datenbank"
  org.opencontainers.image.licenses: MIT

dependencies:
  - name: postgresql
    version: "~18.5.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mariadb
    version: "~25.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: mariadb.enabled
