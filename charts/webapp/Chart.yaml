apiVersion: v2
name: webapp
description: A universal Helm chart for web applications with PHP and/or Node.js support, including an optional database
type: application
version: 1.3.6
appVersion: "1.3"
maintainers:
  - name: JtheGunner
keywords:
  - webapp
  - php
  - nodejs
  - postgresql
  - mariadb
  - kubernetes

# OCI annotations: GHCR reads org.opencontainers.image.source and automatically
# links the package to this repository (required so the workflow's GITHUB_TOKEN
# is allowed to create the package on the first push).
annotations:
  org.opencontainers.image.source: https://github.com/JtheGunner/web-applications-helm-chart
  org.opencontainers.image.description: "Universal Helm chart for PHP and Node.js web applications with optional database"
  org.opencontainers.image.licenses: MIT

dependencies:
  - name: postgresql
    version: "~18.5.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mariadb
    version: "~25.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: mariadb.enabled
