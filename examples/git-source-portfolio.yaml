# =============================================================================
# Example: deploy a PHP app directly from a Git repo
# =============================================================================
# Clones the portfolio repo at pod start, runs composer install (chart default
# for PHP), and serves it with PHP-FPM + Nginx.
#
# Deploy: helm install portfolio charts/webapp -f examples/git-source-portfolio.yaml
#
# For a private repo, create the SSH secret first:
#   kubectl create secret generic portfolio-ssh \
#     --from-file=ssh-privatekey=$HOME/.ssh/id_ed25519 \
#     --from-file=known_hosts=$HOME/.ssh/known_hosts
# =============================================================================

php:
  enabled: true

  # Runtime image: PHP-FPM for request handling.
  # The official image does NOT include composer — but the chart's build step
  # uses the composer:2 image by default, so this works out of the box.
  image:
    repository: php
    tag: "8.3-fpm-alpine"
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  app:
    source: git

    git:
      url: https://github.com/JtheGunner/portfolio
      ref: master           # branch, tag, or commit SHA
      depth: 1              # shallow clone is enough for branch/tag
      # For a private repo over SSH:
      # url: git@github.com:JtheGunner/portfolio.git
      # sshSecret:
      #   name: portfolio-ssh
      #   # privateKeyKey: ssh-privatekey   # default — only set if you renamed it
      #   # knownHostsKey: known_hosts      # default — only set if you renamed it

    # Build step defaults (already enabled for PHP):
    #   image:   composer:2
    #   command: composer install --no-dev --optimize-autoloader --no-interaction
    # Override here if your app needs something different, or set
    # build.enabled: false to skip it entirely.

  # Env vars for the app (override the .env from the repo).
  env:
    - name: APP_ENV
      value: production

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: portfolio.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: portfolio-tls
        hosts:
          - portfolio.example.com
