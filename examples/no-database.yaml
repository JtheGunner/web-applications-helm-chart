# =============================================================================
# Example: Minimal deployment, no database
# =============================================================================
# Deploy: helm install my-app charts/webapp -f examples/no-database.yaml
# =============================================================================

php:
  enabled: true
  image:
    repository: jthegunner/my-simple-app
    tag: "latest"
  replicaCount: 1
  env:
    - name: APP_ENV
      value: development

  ingress:
    enabled: false

# No postgresql.enabled or mariadb.enabled = no database
