# =============================================================================
# FluxCD HelmRelease – PHP app with PostgreSQL
# =============================================================================
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: my-php-app
  namespace: webhosting
spec:
  interval: 5m
  timeout: 10m

  chart:
    spec:
      chart: webapp
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: web-applications-charts
        namespace: flux-system

  releaseName: my-php-app

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    php:
      enabled: true
      image:
        repository: jthegunner/my-php-app
        tag: "v1.0.0"
      replicaCount: 2
      env:
        - name: APP_ENV
          value: production

      ingress:
        enabled: true
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: my-php-app.example.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: my-php-app-tls
            hosts:
              - my-php-app.example.com

    postgresql:
      enabled: true
      auth:
        username: "myapp"
        password: "changeme"
        database: "myapp"
      primary:
        persistence:
          enabled: true
          size: 10Gi
