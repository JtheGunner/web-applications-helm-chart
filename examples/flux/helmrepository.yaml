# =============================================================================
# FluxCD HelmRepository – OCI Registry (empfohlen)
# =============================================================================
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: web-applications-charts
  namespace: flux-system
spec:
  interval: 5m
  type: oci
  url: oci://ghcr.io/jthegunner
  # Optional: Authentication für private Registry
  # secretRef:
  #   name: ghcr-auth
---
