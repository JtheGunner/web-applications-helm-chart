# =============================================================================
# FluxCD HelmRepository – OCI registry (recommended)
# =============================================================================
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: web-applications-charts
  namespace: flux-system
spec:
  interval: 5m
  type: oci
  url: oci://ghcr.io/jthegunner
  # Optional: authentication for a private registry
  # secretRef:
  #   name: ghcr-auth
---
