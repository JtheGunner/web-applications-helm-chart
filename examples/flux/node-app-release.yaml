# =============================================================================
# FluxCD HelmRelease – Node.js App mit MariaDB
# =============================================================================
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: my-node-api
  namespace: webhosting
spec:
  interval: 5m
  timeout: 10m

  chart:
    spec:
      chart: webapp
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: web-applications-charts
        namespace: flux-system

  releaseName: my-node-api

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    nodejs:
      enabled: true
      image:
        repository: jthegunner/my-node-api
        tag: "v2.0.0"
      port: 3000
      replicaCount: 3
      env:
        - name: NODE_ENV
          value: production

      ingress:
        enabled: true
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: api.example.com
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: api-tls
            hosts:
              - api.example.com

    mariadb:
      enabled: true
      auth:
        rootPassword: "changeme-root"
        username: "api"
        password: "changeme"
        database: "api_db"
      primary:
        persistence:
          enabled: true
          size: 10Gi
