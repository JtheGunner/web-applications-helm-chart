# =============================================================================
# Example: PHP only, with PostgreSQL
# =============================================================================
# Deploy: helm install my-app charts/webapp -f examples/only-php.yaml
# =============================================================================

php:
  enabled: true
  image:
    repository: jthegunner/my-php-app
    tag: "v1.0.0"
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    - name: APP_ENV
      value: production
    - name: APP_DEBUG
      value: "false"

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: app.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: app-tls
        hosts:
          - app.example.com

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

postgresql:
  enabled: true
  auth:
    username: "myapp"
    password: "changeme"
    database: "myapp_production"
  primary:
    persistence:
      enabled: true
      size: 10Gi
