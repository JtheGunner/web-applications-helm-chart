# =============================================================================
# Example: deploy a Node.js app directly from a Git repo
# =============================================================================
# Clones a Node repo at pod start, runs npm ci, and starts the app.
#
# Deploy: helm install my-api charts/webapp -f examples/git-source-node.yaml
# =============================================================================

nodejs:
  enabled: true

  image:
    repository: node
    tag: "20-alpine"
    pullPolicy: IfNotPresent

  port: 3000
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Start command inside the cloned repo.
  command:
    - node
    - server.js

  app:
    source: git
    workingDir: /app

    git:
      url: https://github.com/example-org/example-node-api
      ref: main
      depth: 1
      # Private repo:
      # url: git@github.com:example-org/example-node-api.git
      # sshSecret:
      #   name: example-api-ssh
      #   # privateKeyKey: ssh-privatekey   # default — only set if you renamed it
      #   # knownHostsKey: known_hosts      # default — only set if you renamed it

    build:
      enabled: true
      command: "npm ci --omit=dev"
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi

  env:
    - name: NODE_ENV
      value: production

  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: api.example.com
        paths:
          - path: /
            pathType: Prefix
